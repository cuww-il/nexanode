<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaNode — Прошивки, Прокси и Джейлбрейк</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        /* 🌌 КОСМИЧЕСКИЙ ЧЕРНИЧНО-ФИОЛЕТОВЫЙ ФОН ИЗ ADDERLY.TOP */
        body {
            background-color: #0b0813;
            background-image: radial-gradient(circle at 50% -20%, #201335 0%, #0b0813 60%);
            background-attachment: fixed;
            color: #94a3b8; 
            font-family: 'Montserrat', system-ui, -apple-system, sans-serif;
            font-weight: 400;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 📎 ТЕМНАЯ ШАПКА С ФИОЛЕТОВЫМ ТИСПЛЕСКОМ */
        header {
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 40px;
            background-color: rgba(11, 8, 19, 0.85); 
            border-bottom: 1px solid rgba(139, 92, 246, 0.15); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }

        .logo-box svg { 
            height: 44px; 
            width: auto; 
            display: block; 
        }
        .logo-stroke { stroke: #f8fafc; filter: drop-shadow(0 0 4px #8b5cf6); }
        .logo-bg { fill: #0b0813; }
        .logo-text { fill: #f8fafc; font-weight: 800; letter-spacing: 1px; }

        nav {
            display: flex;
            gap: 25px;
        }

        nav a { 
            color: #94a3b8; 
            text-decoration: none; 
            font-weight: 600; 
            text-transform: uppercase; 
            font-size: 0.75rem; 
            letter-spacing: 1.5px;
            transition: color 0.2s, text-shadow 0.2s;
        }
        nav a:hover { 
            color: #f8fafc; 
            text-shadow: 0 0 8px rgba(139, 92, 246, 0.6);
        }

        /* ⚡ ЦЕНТРАЛЬНЫЙ ЗАГОВОЛОК И ТЕКСТ */
        .main-hero { 
            text-align: center; 
            padding: 90px 20px 40px 20px; 
            max-width: 800px;
            margin: 0 auto;
        }
        .main-hero h1 { 
            font-size: 3.5rem; 
            font-weight: 800; 
            color: #f8fafc; 
            margin-bottom: 20px; 
            letter-spacing: -1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .main-hero p { 
            font-size: 1.2rem; 
            font-weight: 500; 
            color: #94a3b8;
            line-height: 1.6; 
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px; 
            padding: 20px 20px 80px 20px; 
            max-width: 1100px; 
            margin: 0 auto; 
            width: 100%;
            align-items: start;
        }

        /* 📦 ПЛОТНЫЕ ТЕМНЫЕ КАРТОЧКИ С НЕОНОВЫМ КОНТУРОМ ПРИ НАВЕДЕНИИ */
        .card {
            background-color: #0e0b16; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 24px;
            padding: 35px; 
            display: flex; 
            flex-direction: column;
            height: auto; 
            min-height: 390px; 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), border-color 0.3s, box-shadow 0.3s;
        }

        .card:hover { 
            transform: translateY(-6px); 
            border-color: rgba(139, 92, 246, 0.4); 
            box-shadow: 0 20px 40px rgba(139, 92, 246, 0.15);
        }

        .card h3 { 
            font-size: 1.5rem; 
            font-weight: 700; 
            color: #f8fafc; 
            margin-bottom: 12px; 
            letter-spacing: -0.5px;
        }
        .card p { 
            color: #94a3b8; 
            font-size: 0.95rem; 
            line-height: 1.6; 
            margin-bottom: 25px; 
        }

        /* 🟢 / 🟠 НЕОНОВЫЕ СТАТУС-БАДЖИ */
        .status-badge { 
            display: inline-flex; 
            align-items: center; 
            background-color: rgba(245, 158, 11, 0.1); 
            color: #f59e0b; 
            border: 1px solid rgba(245, 158, 11, 0.2);
            font-size: 0.7rem; 
            font-weight: 700; 
            padding: 5px 14px; 
            border-radius: 100px; 
            margin-bottom: 18px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            align-self: flex-start; 
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.05);
        }
        .status-dot { width: 6px; height: 6px; background-color: #f59e0b; border-radius: 50%; margin-right: 6px; box-shadow: 0 0 6px #f59e0b; }
        
        /* Зеленый статус для Прокси */
        .status-badge.online { 
            background-color: rgba(16, 185, 129, 0.1); 
            color: #10b981; 
            border: 1px solid rgba(16, 185, 129, 0.2);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.05);
        }
        .status-badge.online .status-dot { background-color: #10b981; box-shadow: 0 0 6px #10b981; }

        /* 🔵 ЯРКАЯ КНОПКА С ФИРМЕННЫМ ГРАДИЕНТОМ ИЗ ADDERLY */
        .tg-button {
            display: block; 
            text-align: center; 
            background: linear-gradient(135deg, #007aff 0%, #0051a8 100%);
            color: #ffffff; 
            text-decoration: none;
            padding: 14px 20px; 
            border-radius: 14px; 
            font-size: 0.9rem; 
            font-weight: 700; 
            margin-top: auto; 
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
            transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
        }
        .tg-button:hover { 
            box-shadow: 0 6px 20px rgba(0, 122, 255, 0.45);
        }
        .tg-button:active {
            transform: scale(0.98);
        }

        /* Интерактивные ссылки */
        .links-menu {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: auto; 
            text-align: left;
        }

        .link-item {
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 12px;
        }
        .link-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .interactive-link {
            color: #10b981; 
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            transition: color 0.2s, text-shadow 0.2s;
        }

        .interactive-link:hover {
            color: #34d399;
            text-shadow: 0 0 8px rgba(52, 211, 153, 0.4);
        }

        .link-desc {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 4px;
        }

        footer {
            margin-top: auto;
            text-align: center;
            padding: 30px;
            font-size: 0.85rem;
            color: #475569;
            border-top: 1px solid rgba(139, 92, 246, 0.1);
            background-color: #07050b;
        }

        @media (max-width: 768px) {
            header { padding: 15px 20px; flex-direction: column; gap: 15px; }
            nav { gap: 15px; }
            .main-hero h1 { font-size: 2.4rem; }
            .features-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
