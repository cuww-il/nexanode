<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaNode — Прошивки, Прокси и Джейлбрейк</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Темная тема по умолчанию */
            --bg-color: #0B0F19; 
            --text-color: #94A3B8;
            --text-main: #F8FAFC;
            --header-bg: rgba(15, 23, 42, 0.7);
            --card-bg: rgba(30, 41, 59, 0.45);
            --card-border: rgba(255, 255, 255, 0.08);
            --svg-stroke: #F8FAFC;
            --svg-fill: #0B0F19;
            --nav-color: #94A3B8;
            --glow-1: #1e1b4b;
            --glow-2: #0c4a6e;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-color: #F4F7FA;
                --text-color: #475569;
                --text-main: #0F172A;
                --header-bg: rgba(255, 255, 255, 0.7);
                --card-bg: rgba(255, 255, 255, 0.5);
                --card-border: rgba(226, 232, 240, 0.8);
                --svg-stroke: #0F172A;
                --svg-fill: #FFFFFF;
                --nav-color: #64748B;
                --glow-1: #e0e7ff;
                --glow-2: #e0f2fe;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            /* Статичные неоновые пятна на фоне — не грузят процессор и встройку */
            background-image: 
                radial-gradient(circle at -10% -10%, var(--glow-1) 0%, transparent 40%),
                radial-gradient(circle at 110% 50%, var(--glow-2) 0%, transparent 40%);
            background-attachment: fixed;
            color: var(--text-color); 
            font-family: 'Montserrat', system-ui, -apple-system, sans-serif;
            font-weight: 400;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 40px;
            background-color: var(--header-bg); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--card-border); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }

        .logo-box svg { 
            height: 44px; 
            width: auto; 
            display: block; 
        }
        .logo-stroke { stroke: var(--svg-stroke); }
        .logo-bg { fill: var(--svg-fill); }
        .logo-text { fill: var(--svg-stroke); font-weight: 700; }

        nav {
            display: flex;
            gap: 25px;
        }

        nav a { 
            color: var(--nav-color); 
            text-decoration: none; 
            font-weight: 600; 
            text-transform: uppercase; 
            font-size: 0.75rem; 
            letter-spacing: 1.5px;
            transition: color 0.2s;
        }
        nav a:hover { 
            color: var(--text-main); 
        }

        .main-hero { 
            text-align: center; 
            padding: 90px 20px 40px 20px; 
            max-width: 800px;
            margin: 0 auto;
        }
        .main-hero h1 { 
            font-size: 3.2rem; 
            font-weight: 700; 
            color: var(--text-main); 
            margin-bottom: 20px; 
            letter-spacing: -1px;
        }
        .main-hero p { 
            font-size: 1.2rem; 
            font-weight: 400; 
            line-height: 1.6; 
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px; 
            padding: 20px 20px 80px 20px; 
            max-width: 1100px; 
            margin: 0 auto; 
            width: 100%;
        }

        /* Настоящий стеклянный эффект, оптимизированный под встроенную графику */
        .card {
            background-color: var(--card-bg); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border); 
            border-radius: 24px;
            padding: 30px; 
            transition: transform 0.2s ease, border-color 0.2s ease;
            display: flex; 
            flex-direction: column;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        @media (prefers-color-scheme: light) {
            .card {
                box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
            }
        }

        .card:hover { 
            transform: translateY(-5px); 
            border-color: rgba(99, 102, 241, 0.4); 
        }

        .card h3 { 
            font-size: 1.4rem; 
            font-weight: 600; 
            color: var(--text-main); 
            margin-bottom: 12px; 
        }
        .card p { 
            color: var(--text-color); 
            font-size: 0.95rem; 
            line-height: 1.6; 
            margin-bottom: 25px; 
        }

        .status-badge { 
            display: inline-flex; 
            align-items: center; 
            background-color: rgba(245, 158, 11, 0.15); 
            color: #F59E0B; 
            font-size: 0.7rem; 
            font-weight: 600; 
            padding: 4px 12px; 
            border-radius: 20px; 
            margin-bottom: 15px; 
            text-transform: uppercase; 
            align-self: flex-start; 
        }
        .status-dot { width: 6px; height: 6px; background-color: #F59E0B; border-radius: 50%; margin-right: 6px; }
        
        .status-badge.online { background-color: rgba(16, 185, 129, 0.15); color: #10B981; }
        .status-badge.online .status-dot { background-color: #10B981; }

        .tg-button {
            display: block; 
            text-align: center; 
            background: linear-gradient(135deg, #24A1DE 0%, #1a84b8 100%);
            color: #FFFFFF; 
            text-decoration: none;
            padding: 12px 15px; 
            border-radius: 14px; 
            font-size: 0.85rem; 
            font-weight: 600; 
            margin-top: auto; 
            box-shadow: 0 4px 12px rgba(36, 161, 222, 0.2);
            transition: opacity 0.2s;
        }
        .tg-button:hover { opacity: 0.9; }

        .links-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: auto;
            text-align: left;
        }

        .link-item {
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 10px;
        }
        .link-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .interactive-link {
            color: #10B981; 
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.2s, padding-left 0.2s;
        }

        .interactive-link:hover {
            color: #059669;
            padding-left: 4px; 
        }

        .link-desc {
            font-size: 0.8rem;
            color: var(--text-color);
            margin-top: 4px;
        }

        footer {
            margin-top: auto;
            text-align: center;
            padding: 30px;
            font-size: 0.85rem;
            color: var(--nav-color);
            border-top: 1px solid var(--card-border);
        }

        @media (max-width: 768px) {
            header { padding: 15px 20px; flex-direction: column; gap: 15px; }
            nav { gap: 15px; }
            .main-hero h1 { font-size: 2.2rem; }
            .features-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

              <text x="130" y="64" font-family="'Montserrat', sans-serif" font-size="34" font-weight="700" letter-spacing="4px" class="logo-text">NEXANODE</text>
            </svg>
        </div>
        <nav>
            <a href="#proxy">Прокси</a>
            <a href="#cydia">iOS & Cydia</a>
            <a href="#android">Android</a>
        </nav>
    </header>

    <main>
        <section class="main-hero">
