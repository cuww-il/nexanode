<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaNode — Прошивки, Прокси и Джейлбрейк</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Переменные для темной темы по умолчанию в стиле Liquid Glass */
            --bg-color: #060913; 
            --text-color: #94A3B8;
            --text-main: #F8FAFC;
            --header-bg: rgba(10, 15, 30, 0.5);
            --card-bg: rgba(15, 23, 42, 0.45);
            --card-border: rgba(255, 255, 255, 0.08);
            --card-inner-glow: rgba(255, 255, 255, 0.03);
            --svg-stroke: #F8FAFC;
            --svg-fill: #060913;
            --nav-color: #94A3B8;
            
            /* Цвета жидкого стекла */
            --sphere-1: rgba(99, 102, 241, 0.6);
            --sphere-2: rgba(14, 165, 233, 0.5);
            --sphere-3: rgba(236, 72, 153, 0.4);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-color: #F4F7FA; 
                --text-color: #475569;
                --text-main: #0F172A;
                --header-bg: rgba(244, 247, 250, 0.5);
                --card-bg: rgba(255, 255, 255, 0.4);
                --card-border: rgba(255, 255, 255, 0.6);
                --card-inner-glow: rgba(255, 255, 255, 0.4);
                --svg-stroke: #0F172A;
                --svg-fill: #F4F7FA;
                --nav-color: #64748B;
                
                --sphere-1: rgba(129, 140, 248, 0.4);
                --sphere-2: rgba(56, 189, 248, 0.4);
                --sphere-3: rgba(244, 114, 182, 0.3);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Montserrat', system-ui, -apple-system, sans-serif;
            font-weight: 400;
            position: relative;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.5s ease; 
        }

        /* --- ЭФФЕКТ ЖИДКОГО СТЕКЛА НА ФОНЕ (Liquid Сферы) --- */
        .liquid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }

        .liquid-sphere {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            mix-blend-mode: screen;
            animation: float-around 20s infinite alternate ease-in-out;
        }

        @media (prefers-color-scheme: light) {
            .liquid-sphere {
                mix-blend-mode: multiply;
                filter: blur(120px);
            }
        }

        .sphere-1 {
            background: var(--sphere-1);
            width: 600px;
            height: 600px;
            top: -200px;
            left: -100px;
            animation-duration: 25s;
        }

        .sphere-2 {
            background: var(--sphere-2);
            width: 550px;
            height: 550px;
            top: 15%;
            right: -150px;
            animation-duration: 18s;
            animation-delay: -5s;
        }

        .sphere-3 {
            background: var(--sphere-3);
            width: 500px;
            height: 500px;
            bottom: -100px;
            left: 20%;
            animation-duration: 22s;
            animation-delay: -2s;
        }

        @keyframes float-around {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            50% { transform: translate(80px, 60px) scale(1.1) rotate(180deg); }
            100% { transform: translate(-40px, 120px) scale(0.9) rotate(360deg); }
        }

        /* --- ШАПКА САЙТА --- */
        header {
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 40px;
            background-color: var(--header-bg); 
            backdrop-filter: blur(24px) saturate(180%); 
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-bottom: 1px solid var(--card-border); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            transition: background-color 0.3s, border-color 0.3s;
        }

        .logo-box svg { 
            height: 44px; 
            width: auto; 
            display: block; 
        }
        .logo-stroke { stroke: var(--svg-stroke); transition: stroke 0.3s; }
        .logo-bg { fill: var(--svg-fill); transition: fill 0.3s; }
        .logo-text { fill: var(--svg-stroke); font-weight: 700; transition: fill 0.3s; }

        nav {
            display: flex;
            gap: 25px;
        }

        nav a { 
            color: var(--nav-color); 
            text-decoration: none; 
            font-weight: 600; 
            text-transform: uppercase; 
            font-size: 0.75rem; 
            letter-spacing: 1.5px;
            transition: color 0.2s, transform 0.2s;
        }
        nav a:hover { 
            color: var(--text-main); 
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        /* --- ГЕРОЙ-СЕКЦИЯ --- */
        .main-hero { 
            text-align: center; 
            padding: 100px 20px 50px 20px; 
            max-width: 850px;
            margin: 0 auto;
        }
        .main-hero h1 { 
            font-size: 3.5rem; 
            font-weight: 800; 
            letter-spacing: -1.5px;
            color: var(--text-main); 
            margin-bottom: 20px; 
            line-height: 1.1;
            background: linear-gradient(135deg, var(--text-main) 40%, #818CF8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .main-hero p { 
            font-size: 1.25rem; 
            font-weight: 400; 
            color: var(--text-color);
            line-height: 1.6; 
        }

        /* --- СЕТКА КАРТОЧЕК (ЖИДКОЕ СТЕКЛО) --- */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
            gap: 28px; 
            padding: 20px 20px 100px 20px; 
            max-width: 1140px; 
            margin: 0 auto; 
            width: 100%;
        }

        .card {
            background-color: var(--card-bg); 
            backdrop-filter: blur(30px) saturate(200%); 
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid var(--card-border); 
            box-shadow: inset 0 1px 1px var(--card-inner-glow), 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            border-radius: 28px;
            padding: 35px; 
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s, border-color 0.4s;
            display: flex; 
            flex-direction: column;
        }

        .card:hover { 
            transform: translateY(-8px) scale(1.01); 
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: inset 0 1px 4px rgba(255,255,255,0.15), 0 24px 48px -12px rgba(0, 0, 0, 0.4);
        }

        .card h3 { 
            font-size: 1.45rem; 
            font-weight: 700; 
            color: var(--text-main); 
            margin-bottom: 12px; 
            letter-spacing: -0.5px;
        }
        .card p { 
            color: var(--text-color); 
            font-size: 0.95rem; 
            line-height: 1.6; 
            margin-bottom: 30px; 
        }

        /* Индикаторы статуса */
        .status-badge { 
            display: inline-flex; 
            align-items: center; 
            background: rgba(245, 158, 11, 0.1); 
            backdrop-filter: blur(5px);
            color: #F59E0B; 
            border: 1px solid rgba(245, 158, 11, 0.2);
            font-size: 0.7rem; 
            font-weight: 700; 
            padding: 6px 14px; 
            border-radius: 100px; 
            margin-bottom: 20px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            align-self: flex-start; 
        }
        .status-dot { width: 6px; height: 6px; background-color: #F59E0B; border-radius: 50%; margin-right: 6px; }
        
        .status-badge.online { 
            background: rgba(16, 185, 129, 0.1); 
            color: #10B981; 
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .status-badge.online .status-dot { background-color: #10B981; }

        /* Кнопка в Telegram */
        .tg-button {
            display: block; 
            text-align: center; 
            background: linear-gradient(135deg, #24A1DE 0%, #007bb6 100%); 
            color: #FFFFFF; 
            text-decoration: none;
            padding: 14px 20px; 
            border-radius: 16px; 
            font-size: 0.9rem; 
            font-weight: 700; 
            margin-top: auto; 
            box-shadow: 0 4px 15px rgba(36, 161, 222, 0.3);
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
        }
        .tg-button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(36, 161, 222, 0.4);
        }
        .tg-button:active { transform: scale(0.97); }

        /* Интерактивные списки */
        .links-menu {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: auto;
            text-align: left;
        }

        .link-item {
